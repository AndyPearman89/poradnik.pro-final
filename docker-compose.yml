services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-wordpress}
      MYSQL_USER: ${DB_USER:-wordpress}
      MYSQL_PASSWORD: ${DB_PASSWORD:-wordpress}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 5s
      timeout: 5s
      retries: 10

  wordpress:
    image: wordpress:6.5-php8.1-apache
    restart: unless-stopped
    ports:
      - "${WP_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: ${DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:-wordpress}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-0}
    volumes:
      - wp_data:/var/www/html
      - ./poradnik.pro:/var/www/html/wp-content/themes/poradnik.pro:ro
      - ./plugins/peartree-local-module:/var/www/html/wp-content/plugins/peartree-local-module:ro
    depends_on:
      mysql:
        condition: service_healthy

  wpcli:
    image: wordpress:cli-php8.1
    profiles: ["tools"]
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: ${DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:-wordpress}
    volumes:
      - wp_data:/var/www/html
      - ./poradnik.pro:/var/www/html/wp-content/themes/poradnik.pro:ro
      - ./plugins/peartree-local-module:/var/www/html/wp-content/plugins/peartree-local-module:ro
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  wp_data:
